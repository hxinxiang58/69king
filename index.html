<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三珠路計算器</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2px 4px; max-width: 500px; margin: 0 auto; background-color: #e8f5e9; }
        
        .btn-group { display: flex; gap: 5px; margin-top: 4px; margin-bottom: 6px; }
        button { font-weight: bold; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; flex: 1; transition: 0.1s; }
        button:active { transform: scale(0.98); }
        
        .btn-b { background-color: #ffcccc; color: #cc0000; border-color: #ff9999; padding: 18px 5px; font-size: 22px; }
        .btn-p { background-color: #cce5ff; color: #0055cc; border-color: #99ccff; padding: 18px 5px; font-size: 22px; }
        .btn-t { background-color: #ccffcc; color: #008000; border-color: #99ff99; padding: 18px 5px; font-size: 18px; }
        .btn-action { background-color: #e0e0e0; color: #333; border-color: #ccc; padding: 10px; font-size: 15px; }
        
        .bead-plate-container { margin-bottom: 6px; }
        .bead-plate {
            display: grid; grid-template-rows: repeat(6, 28px); grid-auto-columns: 28px;
            grid-auto-flow: column; gap: 2px; overflow-x: auto; border: 1px solid #bbb;
            padding: 4px; background: #fff; min-height: 180px; border-radius: 6px; box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }
        .bead { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        .bead-B { background-color: #d9534f; }
        .bead-P { background-color: #0275d8; }
        .bead-T { background-color: #5cb85c; }

        .suggestion-box { background-color: #fffbc8; border: 2px solid #ffca28; padding: 8px; border-radius: 6px; font-size: 15px; font-weight: bold; text-align: center; margin-bottom: 6px; }
        .result-box { background-color: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 6px; line-height: 1.3; margin-bottom: 6px; font-size: 13px; }
        
        .highlight { font-weight: bold; color: #d9534f; }
        .warning { color: white; background-color: #d9534f; padding: 2px 4px; border-radius: 4px; display: inline-block; font-size: 12px;}
        .trend-box { background: #eef2f5; padding: 6px; border-radius: 6px; margin-top: 6px; border: 1px solid #d0d7de; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin: 4px 0; }
        .stat-card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 4px; padding: 4px; display: flex; align-items: center; justify-content: space-between; }
        .stat-info { display: flex; align-items: center; gap: 4px; }
        .stat-badge { background: #444; color: #fff; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; }
        .stat-name { font-size: 12px; color: #666; }
        .stat-value { font-size: 13px; font-weight: bold; color: #333; }
        
        .reason-box { margin-top: 6px; font-size: 12px; background: #fff; padding: 6px; border-radius: 4px; border: 1px solid #e5c365; text-align: left; }
        .comfort-box { margin-top: 6px; font-size: 13px; font-weight: bold; color: #fff; background: #5cb85c; padding: 6px; border-radius: 4px; text-align: center; }
        .backtest-box { margin-top: 6px; font-size: 12px; color: #555; border-top: 1px dashed #ccc; padding-top: 6px; display: flex; flex-direction: column; gap: 2px;}
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="btn-b" onclick="addRecord('B')">莊 (B)</button>
        <button class="btn-p" onclick="addRecord('P')">閒 (P)</button>
        <button class="btn-t" onclick="addRecord('T')">和 (T)</button>
    </div>

    <div class="bead-plate-container">
        <div id="beadPlate" class="bead-plate"></div>
    </div>

    <div class="suggestion-box" id="suggestionArea">策略提示：資料不足</div>

    <div class="result-box" id="resultArea">資料不足</div>

    <div class="btn-group" style="margin-bottom: 2px;">
        <button class="btn-action" onclick="undo()">⬅ 退回</button>
        <button class="btn-action" onclick="clearAll()">🗑 清空</button>
    </div>

    <script>
        let historyData = [];
        const codes = { 'BBB': 1, 'PPP': 1, 'BBP': 2, 'PPB': 2, 'BPP': 3, 'PBB': 3, 'BPB': 4, 'PBP': 4 };
        const patternMap = { 1: ['BBB', 'PPP'], 2: ['BBP', 'PPB'], 3: ['BPP', 'PBB'], 4: ['BPB', 'PBP'] };

        function addRecord(type) { historyData.push(type); updateUI(); }
        function undo() { if (historyData.length > 0) { historyData.pop(); updateUI(); } }
        function clearAll() { historyData = []; updateUI(); }

        function getTopTrend(trendStatsObj, lastCode) {
            let maxVal = Math.max(...Object.values(trendStatsObj));
            let candidates = Object.keys(trendStatsObj).filter(k => trendStatsObj[k] === maxVal);
            if (candidates.length === 1) return candidates[0];
            let preferred = candidates.find(c => c.includes(lastCode.toString()));
            return preferred || candidates[0];
        }

        function updateUI() {
            const beadPlate = document.getElementById('beadPlate');
            beadPlate.innerHTML = historyData.map(item => `<div class="bead bead-${item}">${item === 'B' ? '莊' : item === 'P' ? '閒' : '和'}</div>`).join('');
            beadPlate.scrollLeft = beadPlate.scrollWidth;

            const validData = historyData.filter(item => item === 'B' || item === 'P');
            let chunks = [];
            for (let i = 0; i <= validData.length - 3; i += 3) {
                chunks.push(validData[i] + validData[i+1] + validData[i+2]);
            }

            const resultArea = document.getElementById('resultArea');
            const suggestionArea = document.getElementById('suggestionArea');

            if (chunks.length === 0) {
                resultArea.innerHTML = "<div style='text-align:center; color:#888;'>資料不足</div>";
                suggestionArea.innerHTML = "策略提示：資料收集中";
                return;
            }

            let stats = { 1: 0, 2: 0, 3: 0, 4: 0 };
            chunks.forEach(chunk => { stats[codes[chunk]]++; });

            let isBadStart = false;
            if (chunks.length >= 4) {
                let first4Codes = new Set();
                for (let i = 0; i < 4; i++) { first4Codes.add(codes[chunks[i]]); }
                if (first4Codes.size === 4) isBadStart = true;
            }

            const trendStats = {
                '正式(1,2,4)': stats[1] + stats[2] + stats[4],
                '反/跳(2,3,4)': stats[2] + stats[3] + stats[4],
                '連式(1,2,3)': stats[1] + stats[2] + stats[3]
            };
            
            let lastCodeStr = chunks[chunks.length - 1] || "";
            let lastCode = codes[lastCodeStr] || 0;
            const topTrend = getTopTrend(trendStats, lastCode);

            let isTrendChanging = false;
            let recentTopTrend = "";
            if (chunks.length >= 4) {
                let recentChunks = chunks.slice(-3);
                let rStats = { 1: 0, 2: 0, 3: 0, 4: 0 };
                recentChunks.forEach(chunk => { rStats[codes[chunk]]++; });
                let rTrendStats = {
                    '正式(1,2,4)': rStats[1] + rStats[2] + rStats[4],
                    '反/跳(2,3,4)': rStats[2] + rStats[3] + rStats[4],
                    '連式(1,2,3)': rStats[1] + rStats[2] + rStats[3]
                };
                let rLastCode = codes[recentChunks[recentChunks.length - 1]];
                recentTopTrend = getTopTrend(rTrendStats, rLastCode);
                if (recentTopTrend !== topTrend) isTrendChanging = true;
            }

            const maxCount = Math.max(...Object.values(stats));
            const wangMen = Object.keys(stats).filter(k => stats[k] === maxCount && maxCount > 0);

            let html = `<div style="font-size:13px; margin-bottom:4px;">有效：<b>${chunks.length}</b> 組</div>`;
            html += `<div class="stats-grid">
                        <div class="stat-card"><div class="stat-info"><div class="stat-badge">1</div><div class="stat-name">三連</div></div><div class="stat-value">${stats[1]}</div></div>
                        <div class="stat-card"><div class="stat-info"><div class="stat-badge">2</div><div class="stat-name">兩連一跳</div></div><div class="stat-value">${stats[2]}</div></div>
                        <div class="stat-card"><div class="stat-info"><div class="stat-badge">3</div><div class="stat-name">一跳兩連</div></div><div class="stat-value">${stats[3]}</div></div>
                        <div class="stat-card"><div class="stat-info"><div class="stat-badge">4</div><div class="stat-name">單跳</div></div><div class="stat-value">${stats[4]}</div></div>
                     </div>`;
            html += `<div class="trend-box"><b>趨勢：</b>`;
            for (let t in trendStats) { 
                let isTop = (t === topTrend) ? "font-weight:bold; color:#d9534f;" : "";
                html += `<div style="display:flex; justify-content:space-between; color:#555; ${isTop}"><span>${t}</span><span>${trendStats[t]}次</span></div>`; 
            }
            html += `<hr style="border:0; border-top:1px solid #ccc; margin:4px 0;">`;
            html += `<div><b>最強：</b> <span class="highlight">${topTrend}</span></div>`;
            if (isTrendChanging) html += `<div style="margin-top:2px;"><span class="warning">近期轉為：${recentTopTrend}</span></div>`;
            html += `</div>`;
            resultArea.innerHTML = html;

            let simWins = 0, simLosses = 0; 
            let comfortWins = 0, comfortLosses = 0; 
            
            if (!isBadStart) {
                for (let i = 4; i < chunks.length; i++) {
                    let pStats = { 1: 0, 2: 0, 3: 0, 4: 0 };
                    for (let j = 0; j < i; j++) pStats[codes[chunks[j]]]++;
                    
                    let pTrendStats = {
                        '正式(1,2,4)': pStats[1] + pStats[2] + pStats[4],
                        '反/跳(2,3,4)': pStats[2] + pStats[3] + pStats[4],
                        '連式(1,2,3)': pStats[1] + pStats[2] + pStats[3]
                    };
                    let pLastCode = codes[chunks[i-1]];
                    let pTopTrend = getTopTrend(pTrendStats, pLastCode);

                    let pIsTrendChanging = false;
                    if (i >= 4) {
                        let recentChunks = [];
                        for(let k = i-3; k < i; k++) recentChunks.push(chunks[k]);
                        let rStats = { 1: 0, 2: 0, 3: 0, 4: 0 };
                        recentChunks.forEach(c => rStats[codes[c]]++);
                        let rTrendStats = {
                            '正式(1,2,4)': rStats[1] + rStats[2] + rStats[4],
                            '反/跳(2,3,4)': rStats[2] + rStats[3] + rStats[4],
                            '連式(1,2,3)': rStats[1] + rStats[2] + rStats[3]
                        };
                        let rLastCode = codes[recentChunks[2]];
                        let rTopTrend = getTopTrend(rTrendStats, rLastCode);
                        if (rTopTrend !== pTopTrend) pIsTrendChanging = true;
                    }

                    let pMax = Math.max(...Object.values(pStats));
                    let pWang = Object.keys(pStats).filter(k => pStats[k] === pMax);
                    let h1 = chunks[i][0], actualH2 = chunks[i][1], actualH3 = chunks[i][2];
                    let possible = new Set();
                    pWang.forEach(c => { patternMap[c].forEach(p => { if (p[0] === h1) possible.add(p[1]); }); });
                    
                    let predictedH2 = null;
                    if (!pIsTrendChanging && possible.size === 1) {
                        predictedH2 = Array.from(possible)[0];
                        if (predictedH2 === actualH2) simWins++; else simLosses++;
                    }

                    let won2ndHit = (predictedH2 !== null && predictedH2 === actualH2);

                    if (!won2ndHit) {
                        let totalC = comfortWins + comfortLosses;
                        let isCSafe = (totalC === 0 || (comfortWins / totalC) >= 0.5);
                        
                        if (h1 === actualH2 && pStats[1] === 0 && isCSafe) {
                            if (actualH3 === (actualH2 === 'B' ? 'P' : 'B')) comfortWins++; else comfortLosses++;
                        } else if (h1 !== actualH2 && pStats[4] === 0 && isCSafe) {
                            if (actualH3 === (actualH2 === 'B' ? 'B' : 'P')) comfortWins++; else comfortLosses++;
                        }
                    }
                }
            }

            const remainder = validData.length % 3;
            let suggestion = "";
            const totalComfort = comfortWins + comfortLosses;
            const winRate2Val = totalComfort > 0 ? (comfortWins / totalComfort) : 0;
            const isComfortZoneSafe = (winRate2Val >= 0.5 || totalComfort === 0);
            
            if (chunks.length < 4) { suggestion = `收集中 (${chunks.length}/4)`; } 
            else if (isBadStart) { suggestion = "<span class='warning'>⚠️ 前4組1~4全開，建議離場</span>"; } 
            else if (remainder === 1) {
                if (isTrendChanging) { suggestion = "<span class='warning'>⚠️ 勢變衝突，暫停</span>"; } 
                else {
                    const h1 = validData[validData.length - 1];
                    let possible = new Set();
                    wangMen.forEach(c => { patternMap[c].forEach(p => { if (p[0] === h1) possible.add(p[1]); }); });
                    if (possible.size === 1) {
                        const side = Array.from(possible)[0], sideStr = side === 'B' ? "<span style='color:#cc0000; font-size:22px;'>下注：莊 (B)</span>" : "<span style='color:#0055cc; font-size:22px;'>下注：閒 (P)</span>";
                        suggestion = `${sideStr}<div class="reason-box"><b>💡 邏輯：</b>符合「${topTrend}」。</div>`;
                    } else { suggestion = "方向衝突，觀察"; }
                }
            } else if (remainder === 2) {
                const h1 = validData[validData.length - 2];
                const h2 = validData[validData.length - 1];
                
                let possibleH2 = new Set();
                wangMen.forEach(c => { patternMap[c].forEach(p => { if (p[0] === h1) possibleH2.add(p[1]); }); });
                let predictedH2 = (!isTrendChanging && possibleH2.size === 1) ? Array.from(possibleH2)[0] : null;

                if (predictedH2 === h2) {
                    suggestion = "<span style='color:#008000;'>🎉 第二口已獲利，本列收工觀察</span>";
                } else {
                    let comfortSuggestion = "";
                    if (h1 === h2 && stats[1] === 0) {
                        if (isComfortZoneSafe) {
                            comfortSuggestion = `<div class="comfort-box">🛡️ 舒適區：下注 ${h2 === 'B' ? '閒 (P)' : '莊 (B)'}<br><small>代碼1盲門，斷連機率高</small></div>`;
                        } else {
                            comfortSuggestion = "<span style='color:#888;'>已過第二口，觀察 <br><small>⚠️ 舒適區勝率過低，系統已鎖定保護</small></span>";
                        }
                    } else if (h1 !== h2 && stats[4] === 0) {
                        if (isComfortZoneSafe) {
                            comfortSuggestion = `<div class="comfort-box">🛡️ 舒適區：下注 ${h2 === 'B' ? '莊 (B)' : '閒 (P)'}<br><small>代碼4盲門，黏住機率高</small></div>`;
                        } else {
                            comfortSuggestion = "<span style='color:#888;'>已過第二口，觀察 <br><small>⚠️ 舒適區勝率過低，系統已鎖定保護</small></span>";
                        }
                    }
                    suggestion = comfortSuggestion || "已過第二口，觀察";
                }
            } else { suggestion = "新列第 1 口，觀察"; }

            const winRate1 = (simWins+simLosses) > 0 ? ((simWins/(simWins+simLosses))*100).toFixed(1)+"%" : "---";
            const winRate2 = (comfortWins+comfortLosses) > 0 ? ((comfortWins/(comfortWins+comfortLosses))*100).toFixed(1)+"%" : "---";

            suggestionArea.innerHTML = `<div style="margin-bottom:4px; color:#555; font-size:13px;">策略提示：</div>
                                        <div>${suggestion}</div>
                                        <div class="backtest-box">
                                            <div>📍 <b>建議第二口：</b> ${simWins}勝 ${simLosses}負 (${winRate1})</div>
                                            <div>🛡️ <b>舒適區第三口：</b> ${comfortWins}勝 <span style="color:#d9534f; font-weight:bold;">${comfortLosses}負</span> (${winRate2})</div>
                                        </div>`;
        }
    </script>
</body>
</html>
